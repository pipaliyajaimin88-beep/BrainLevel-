workflows:
  android-workflow:
    name: BrainLevel Android Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: latest
      java: 17
    scripts:
      - name: Setup Folders and Install
        script: |
          npm install
          mkdir -p www
          cp index.html styles.css game-logic.js levels.json manifest.json www/ || true
      - name: Sync Capacitor
        script: |
          npx cap sync android
      - name: Build APK
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
