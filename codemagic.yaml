workflows:
  android-workflow:
    name: BrainLevel White Screen Fix
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: 20
      java: 17
    scripts:
      - name: Prepare Web Assets
        script: |
          # 1. Create the 'www' folder
          mkdir -p www
          # 2. Copy all your game files into 'www'
          cp index.html styles.css game-logic.js levels.json manifest.json www/
          # 3. Create a fresh package.json if missing
          if [ ! -f package.json ]; then
            echo '{"name":"brainlevel","version":"1.0.0"}' > package.json
          fi
          # 4. Install Capacitor tools
          npm install @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6
      - name: Sync and Build
        script: |
          # 5. Tell Capacitor to use the 'www' files
          npx cap sync android
          # 6. Build the final APK
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
