workflows:
  android-workflow:
    name: BrainLevel Bulletproof Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: 20
      java: 17
    scripts:
      - name: All-in-One Setup
        script: |
          # 1. Clean up to prevent any old errors
          rm -rf www android node_modules package.json capacitor.config.json
          
          # 2. Create fresh configuration
          echo '{"name":"brainlevel","version":"1.0.0"}' > package.json
          echo '{"appId":"com.brainlevel.game","appName":"BrainLevel","webDir":"www"}' > capacitor.config.json
          
          # 3. Install Capacitor tools
          npm install @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6
          
          # 4. Find your game files and move them to 'www'
          mkdir -p www
          find . -maxdepth 3 -name "index.html" -not -path "./www/*" -exec cp {} www/index.html \;
          find . -maxdepth 3 -name "styles.css" -not -path "./www/*" -exec cp {} www/styles.css \;
          find . -maxdepth 3 -name "game-logic.js" -not -path "./www/*" -exec cp {} www/game-logic.js \;
          find . -maxdepth 3 -name "levels.json" -not -path "./www/*" -exec cp {} www/levels.json \;
          
          # 5. Create the Android folder from scratch (This fixes the Sync error!)
          npx cap add android
          npx cap sync android
      - name: Final APK Build
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
