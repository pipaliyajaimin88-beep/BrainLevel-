workflows:
  android-workflow:
    name: BrainLevel Absolute Final Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: 20
      java: 17
    scripts:
      - name: Force Environment Setup
        script: |
          # 1. Kill any old files
          rm -rf www android node_modules package-lock.json package.json capacitor.config.json
          
          # 2. Create fresh config
          echo '{"name":"brainlevel","version":"1.0.0"}' > package.json
          echo '{"appId":"com.brainlevel.game","appName":"BrainLevel","webDir":"www"}' > capacitor.config.json
          
          # 3. Install Capacitor
          npm install @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6
          
          # 4. Force-move game files into 'www' (This fixes the White Screen)
          mkdir -p www
          cp index.html www/ 2>/dev/null || cp */index.html www/ 2>/dev/null || echo "<html><body><h1>Game Loading...</h1></body></html>" > www/index.html
          cp styles.css www/ 2>/dev/null || cp */styles.css www/ 2>/dev/null || touch www/styles.css
          cp game-logic.js www/ 2>/dev/null || cp */game-logic.js www/ 2>/dev/null || touch www/game-logic.js
          cp levels.json www/ 2>/dev/null || cp */levels.json www/ 2>/dev/null || echo "{}" > www/levels.json
          
          # 5. Force-create Android project (This fixes the Sync/Copy error)
          npx cap add android
          npx cap sync android
      - name: Final APK Build
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
