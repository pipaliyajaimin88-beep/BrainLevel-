workflows:
  android-workflow:
    name: BrainLevel Absolute Final Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: 20
      java: 17
    scripts:
      - name: Force Clean Build
        script: |
          # 1. Clean up
          rm -rf www android node_modules package.json capacitor.config.json
          
          # 2. Create fresh config
          echo '{"name":"brainlevel","version":"1.0.0"}' > package.json
          echo '{"appId":"com.brainlevel.game","appName":"BrainLevel","webDir":"www"}' > capacitor.config.json
          
          # 3. Setup Folders
          mkdir -p www
          
          # 4. Extract your ZIP
          ZIP_NAME=$(ls *.zip | head -n 1)
          if [ -n "$ZIP_NAME" ]; then
            unzip -o "$ZIP_NAME" -d temp_zip
            REAL_PATH=$(find temp_zip -name "index.html" | head -n 1)
            if [ -n "$REAL_PATH" ]; then
              cp -r $(dirname "$REAL_PATH")/* www/
            fi
          fi
          
          # 5. OVERRIDE with the FIXED Brain and FIXED Styles
          cp game-logic.js www/game-logic.js
          cp styles.css www/styles.css
          
          # 6. Install and Sync
          npm install @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6
          npx cap add android
          npx cap sync android
      - name: Final Build
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
