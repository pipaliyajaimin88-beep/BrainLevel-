workflows:
  android-workflow:
    name: BrainLevel Safe Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: latest
      java: 17
    scripts:
      - name: Safe Environment Setup
        script: |
          # 1. Create essential files
          echo '{"name":"brainlevel","version":"1.0.0"}' > package.json
          echo '{"appId":"com.brainlevel.game","appName":"BrainLevel","webDir":"www"}' > capacitor.config.json
          
          # 2. Install only what is needed
          npm install @capacitor/cli @capacitor/core @capacitor/android
          
          # 3. Setup the game folder
          mkdir -p www
          cp index.html www/index.html || echo "index.html missing"
          cp styles.css www/styles.css || echo "styles.css missing"
          cp game-logic.js www/game-logic.js || echo "game-logic.js missing"
          cp levels.json www/levels.json || echo "levels.json missing"
          
          # 4. Initialize Android
          npx cap add android || echo "Android already exists"
          npx cap sync android
      - name: Final APK Build
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
