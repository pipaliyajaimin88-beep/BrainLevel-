workflows:
  android-workflow:
    name: BrainLevel Mobile Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: 20
      java: 17
    scripts:
      - name: Auto-Unzip and Setup
        script: |
          # 1. Find and Unzip your file automatically
          ZIP_NAME=$(ls *.zip | head -n 1)
          if [ -z "$ZIP_NAME" ]; then
            echo "No zip found!"
          else
            unzip -o "$ZIP_NAME" -d my_game
          fi
          
          # 2. Find the game files inside the zip
          mkdir -p www
          REAL_PATH=$(find my_game -name "index.html" | head -n 1)
          if [ -z "$REAL_PATH" ]; then
            echo "index.html not found!"
          else
            # Move everything to the 'www' folder
            cp -r $(dirname "$REAL_PATH")/* www/
          fi
          
          # 3. Setup the App
          echo '{"name":"brainlevel","version":"1.0.0"}' > package.json
          echo '{"appId":"com.brainlevel.game","appName":"BrainLevel","webDir":"www"}' > capacitor.config.json
          npm install @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6
          npx cap add android || true
          npx cap sync android
      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
