workflows:
  android-workflow:
    name: BrainLevel Last Chance Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: 20
      java: 17
    scripts:
      - name: Diagnostic Setup
        script: |
          echo "--- SHOWING ALL FILES ---"
          ls -R
          
          echo "--- CLEANING UP ---"
          rm -rf android www node_modules package-lock.json package.json capacitor.config.json
          
          echo "--- CREATING CONFIG ---"
          echo '{"name":"brainlevel","version":"1.0.0"}' > package.json
          echo '{"appId":"com.brainlevel.game","appName":"BrainLevel","webDir":"www"}' > capacitor.config.json
          
          echo "--- INSTALLING TOOLS ---"
          npm install @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6
          
          echo "--- MOVING GAME FILES ---"
          mkdir -p www
          find . -maxdepth 4 -name "index.html" -exec cp {} www/index.html \;
          find . -maxdepth 4 -name "styles.css" -exec cp {} www/styles.css \;
          find . -maxdepth 4 -name "game-logic.js" -exec cp {} www/game-logic.js \;
          find . -maxdepth 4 -name "levels.json" -exec cp {} www/levels.json \;
          
          echo "--- BUILDING ANDROID ---"
          npx cap add android
          npx cap sync android
      - name: Final Build
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
